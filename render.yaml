services:
  - type: web
    name: voterpath
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
    healthCheckPath: /health
